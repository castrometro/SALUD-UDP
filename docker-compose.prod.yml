services:
  # --- Base de Datos ---
  db:
    image: mysql:8.0
    container_name: clinica_prod_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - clinica_net

  # --- Backend (Django + Gunicorn) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: clinica_prod_backend
    restart: always
    volumes:
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=False
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - DJANGO_SUPERUSER_FIRST_NAME=${DJANGO_SUPERUSER_FIRST_NAME}
      - DJANGO_SUPERUSER_LAST_NAME=${DJANGO_SUPERUSER_LAST_NAME}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    networks:
      - clinica_net

  # --- Nginx (SSL + static files + reverse proxy) ---
  nginx:
    image: nginx:alpine
    container_name: clinica_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - frontend_build:/var/www/frontend:ro
      - /etc/ssl/certs/site.crt:/etc/ssl/certs/site.crt:ro
      - /etc/ssl/private/site.key:/etc/ssl/private/site.key:ro
    depends_on:
      - backend
      - frontend_build
    networks:
      - clinica_net

  # --- Frontend Build (solo genera archivos, luego se apaga) ---
  frontend_build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: clinica_prod_frontend_build
    volumes:
      - frontend_build:/app/dist

networks:
  clinica_net:
    driver: bridge

volumes:
  db_data:
  static_files:
  frontend_build:
