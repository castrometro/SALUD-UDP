services:
  # --- Base de Datos ---
  db:
    image: mysql:8.0
    container_name: clinica_dev_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - clinica_net

  # --- Backend (Django) ---
  backend:
    build: ./backend
    container_name: clinica_dev_backend
    entrypoint: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=${DJANGO_DEBUG}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    networks:
      - clinica_net

  # --- Frontend (Vite + React) ---
  # Acceder en http://localhost:5173
  # El proxy de Vite reenvía /api → backend:8000
  frontend:
    build: ./frontend
    container_name: clinica_dev_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - clinica_net

networks:
  clinica_net:
    driver: bridge

volumes:
  db_data:
